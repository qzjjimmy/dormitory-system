<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宿舍管理系统后端服务</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4fbfd;
      color: #263443;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    main {
      width: min(560px, calc(100% - 32px));
      padding: 36px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #edf3f6;
      box-shadow: 0 16px 38px rgba(98, 132, 158, .13);
    }
    h1 { margin: 0 0 12px; }
    p { color: #788897; line-height: 1.8; }
    a { color: #4b8fe8; font-weight: 700; }
    code {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 6px;
      background: #eef8ff;
      color: #4b8fe8;
    }
  </style>
</head>
<body>
<main>
  <h1>后端 API 服务运行中</h1>
  <p>这是 Spring Boot 后端地址。前后端分离版本请启动 Vue 前端后访问：</p>
  <p><a href="http://localhost:5173">http://localhost:5173</a></p>
  <p>接口示例：<code>/api/auth/login</code>、<code>/api/records</code>、<code>/api/dashboard</code></p>
</main>
</body>
</html>
